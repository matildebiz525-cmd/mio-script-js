<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<title>Rosalind Franklin</title>

<style>



body{
    margin:0;
    padding:0;

    font-family: Arial, sans-serif;

    background: linear-gradient(
    135deg,
    rgb(153,199,168),
    rgb(182,220,194)
    );

    /* PERMETTE LO SCORRIMENTO */
    overflow-x:hidden;
}

/* =========================
   HEADER
========================= */

header{

    background: rgba(255,255,255,0.2);

    backdrop-filter: blur(8px);

    border-bottom:3px solid white;

    padding:25px;

    text-align:center;

    box-shadow:0 0 15px rgba(0,0,0,0.2);

    animation: comparsa 1.2s ease;
}

h1{

    margin:0;

    font-size:50px;

    letter-spacing:2px;

    color:rgb(20,20,20);

    text-shadow:
    0 0 10px rgba(255,255,255,0.7);

    animation: luce 3s infinite alternate;
}

/* =========================
   LAYOUT PRINCIPALE
========================= */

#grid{

    display:grid;

    grid-template-columns: 260px 1fr;

    min-height:85vh;
}

/* =========================
   MENU LATERALE
========================= */

#menu{

    background: rgba(255,255,255,0.15);

    backdrop-filter: blur(10px);

    padding-top:40px;

    padding-bottom:40px;

    border-right:3px solid rgba(255,255,255,0.4);

    box-shadow:0 0 20px rgba(0,0,0,0.2);

    animation: slideMenu 1s ease;
}

/* =========================
   LINK MENU
========================= */

#menu a{

    display:block;

    width:80%;

    margin:15px auto;

    padding:15px;

    text-align:center;

    text-decoration:none;

    font-size:20px;

    font-family:"Trebuchet MS";

    color:black;

    border-radius:15px;

    background: rgba(255,255,255,0.25);

    transition:0.4s;
}

/* Hover link */

#menu a:hover{

    transform:scale(1.08);

    background: rgb(200,227,213);

    box-shadow:
    0 0 15px rgba(0,120,90,0.5);

    letter-spacing:1px;
}

/* =========================
   CENTRO
========================= */

#centro{

    padding:15px;

    animation: comparsa 1.5s ease;
}

/* =========================
   IFRAME
========================= */

iframe{

    width:100%;

    height:800px;

    border:none;

    border-radius:20px;

    background:white;

    box-shadow:
    0 0 20px rgba(0,0,0,0.25);
}

/* =========================
   FOOTER
========================= */

footer{

    text-align:center;

    padding:20px;

    font-size:18px;

    background: rgba(255,255,255,0.2);

    backdrop-filter: blur(6px);

    border-top:2px solid white;

    color:black;

    box-shadow:0 -5px 10px rgba(0,0,0,0.1);
}

/* =========================
   ANIMAZIONI
========================= */

@keyframes comparsa{

    from{
        opacity:0;
        transform:translateY(30px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* Animazione menu */

@keyframes slideMenu{

    from{
        transform:translateX(-100%);
    }

    to{
        transform:translateX(0);
    }
}

/* Effetto luce titolo */

@keyframes luce{

    from{
        text-shadow:
        0 0 10px white;
    }

    to{
        text-shadow:
        0 0 20px rgb(0,120,90);
    }
}

/* =========================
   CERCHI DECORATIVI
========================= */

.circle{

    position:absolute;

    border-radius:50%;

    background:rgba(255,255,255,0.15);

    animation: float 8s infinite ease-in-out;
}

@keyframes float{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-25px);
    }

    100%{
        transform:translateY(0px);
    }
}

</style>
</head>

<body>

style="

height:120px;
top:100px;
left:100px;">
